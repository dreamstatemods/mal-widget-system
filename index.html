<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<title>MAL Widget — Blood Ink</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: 'DOS JP';
  src: url('assets/Px437_DOS-V_re_JPN12.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

@font-face {
  font-family: 'HomeVideo';
  src: url('assets/HomeVideoBold-bLG6g.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

@font-face {
  font-family: 'BestTen';
  src: url('assets/BestTen-DOT.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
}

*, *::before, *::after { box-sizing: border-box; }

:root {
  --manga-primary:  #ffffff;
  --manga-glow:     rgba(255,255,255,0.55);
  --manga-glow-sm:  rgba(255,255,255,0.3);
  --anime-primary:  #00cc55;
  --anime-glow:     rgba(0,204,85,0.55);
  --anime-glow-sm:  rgba(0,204,85,0.3);
  --accent:         #ffffff;
  --bg:             #080808;
  --surface:        #0e0e0e;
  --border:         #1c1c1c;
  --text-primary:   #00cc55;
  --text-muted:     #00aa44;
  --text-dim:       #007733;
}

body {
  background: #0b0b0b;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 0;
  margin: 0;
  height: fit-content;
  font-family: 'DOS JP', 'Noto Sans JP', monospace;
}

/* ===================== SCANLINE TEXTURE ===================== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ===================== WIDGET SHELL ===================== */
.mal-widget {
  background: linear-gradient(to bottom, #0a1a0e, #0e0e0e 40%, #080808);
  color: var(--text-primary);
  width: 300px;
  min-width: 300px;
  max-width: 300px;
  padding: 14px;
  position: relative;
  /* Double border via outline trick */
  border: 1px solid #1a1a1a;
  outline: 2px solid var(--manga-primary);
  outline-offset: -1px;
  box-shadow:
    0 0 0 3px #0a0a0a,
    0 0 30px rgba(255,255,255,0.15),
    inset 0 0 60px rgba(0,0,0,0.6);
  transition: outline-color 0.5s ease, box-shadow 0.5s ease;
}

.mal-widget::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    repeating-conic-gradient(rgba(255,255,255,0.025) 0% 25%, transparent 0% 50%) 0 0 / 2px 2px,
    radial-gradient(ellipse at top left, rgba(255,255,255,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at bottom right, rgba(255,255,255,0.03) 0%, transparent 60%);
  pointer-events: none;
}

.mal-widget.anime-mode {
  outline-color: var(--anime-primary);
  border-color: #0a3a1a;
  --text-primary: #ffffff;
  --text-muted:   #cccccc;
  --text-dim:     #999999;
  box-shadow:
    0 0 0 3px #051a0a,
    0 0 30px rgba(0,180,70,0.15),
    inset 0 0 60px rgba(0,0,0,0.6);
}

/* ===================== HEADER ===================== */
.mal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 12px;
  margin-bottom: 16px;
  position: relative;
}

/* Gradient divider under header */
.mal-header::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--manga-primary), transparent);
  transition: background 0.5s ease;
}

.mal-widget.anime-mode .mal-header::after {
  background: linear-gradient(to right, transparent, var(--anime-primary), transparent);
}

/* Username — LEFT, CCTV style */
.mal-username-wrap {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.mal-username-label {
  font-family: 'DOS JP', monospace;
  font-size: 11px;
  font-weight: normal;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.mal-username {
  font-family: 'BestTen', monospace;
  font-size: 22px;
  font-weight: normal;
  color: var(--manga-primary);
  letter-spacing: 0.04em;
  text-shadow: 0 0 10px var(--manga-glow-sm);
  transition: color 0.3s ease, text-shadow 0.3s ease;
  margin: 0;
  line-height: 1;
  cursor: pointer;
}

.mal-username:hover {
  color: #0e0e0e;
  background: var(--manga-primary);
  text-shadow: none;
  padding: 1px 4px;
  margin: -1px -4px;
}

.mal-widget.anime-mode .mal-username {
  color: var(--anime-primary);
  text-shadow: 0 0 10px var(--anime-glow-sm);
}

.mal-widget.anime-mode .mal-username:hover {
  color: #0e0e0e;
  background: var(--anime-primary);
  text-shadow: none;
  padding: 1px 4px;
  margin: -1px -4px;
}

/* Toggle — RIGHT */
.mode-switch {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: #999;
  font-family: 'DOS JP', monospace;
  font-weight: normal;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  flex-shrink: 0;
  image-rendering: pixelated;
}

.mode-switch input { display: none; }

.slider {
  width: 30px;
  height: 16px;
  background: #00cc55;
  border-radius: 0px; /* sharp/square to match the theme */
  position: relative;
  cursor: pointer;
  transition: background 0.4s ease, box-shadow 0.4s ease;
  box-shadow: 0 0 8px rgba(0,204,85,0.3);
  flex-shrink: 0;
}

.slider::before {
  content: "";
  width: 11px;
  height: 11px;
  background: #fff;
  position: absolute;
  top: 2.5px;
  left: 2.5px;
  border-radius: 0;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

input:checked + .slider {
  background: #00cc55;
  box-shadow: 0 0 8px rgba(0,204,85,0.3);
}

input:checked + .slider::before {
  transform: translateX(14px);
}

.label-manga { color: var(--anime-primary); transition: color 0.4s ease; }
.label-anime  { color: #999; transition: color 0.4s ease; }

.mal-widget.anime-mode .label-manga { color: #999; }
.mal-widget.anime-mode .label-anime  { color: var(--anime-primary); }

/* ===================== STATS SUMMARY — CCTV readout ===================== */
.stats-summary {
  display: flex;
  justify-content: space-between;
  margin-bottom: 12px;
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'DOS JP', monospace;
  font-weight: normal;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.stats-summary .readout-block {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.stats-summary .readout-key {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  font-family: 'DOS JP', monospace;
}

.stats-summary .readout-val {
  color: var(--manga-primary);
  font-size: 20px;
  font-weight: normal;
  letter-spacing: 0.04em;
  font-family: 'BestTen', monospace;
}

.mal-widget.anime-mode .stats-summary .readout-val { color: var(--anime-primary); }
.section-label {
  font-family: 'BestTen', monospace;
  font-size: 13px;
  font-weight: normal;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
  padding-left: 8px;
  border-left: 2px solid var(--manga-primary);
  transition: border-color 0.5s ease;
}

.mal-widget.anime-mode .section-label { border-left-color: var(--anime-primary); }

/* ===================== STAT BAR — SLASHED SEGMENTS ===================== */
.stats-bar-svg {
  display: block;
  width: 100%;
  height: 12px;
  margin-bottom: 14px;
  overflow: visible;
}

/* SVG polygon fill colors — set via JS but defaults here */
#bar-watching  { fill: #00cc55; }
#bar-completed { fill: #e8e0dc; }
#bar-onhold    { fill: #f3f34e; }
#bar-dropped   { fill: #4edc4e; }
#bar-plan      { fill: #515151; }

/* ===================== STATS GRID ===================== */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px 10px;
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'DOS JP', monospace;
  font-weight: normal;
  letter-spacing: 0.03em;
  margin-bottom: 4px;
}

.stats-grid > div {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.stats-grid .stat-val {
  color: var(--manga-primary);
  font-weight: normal;
  font-family: 'DOS JP', monospace;
  font-size: 12px;
  image-rendering: pixelated;
}

.mal-widget.anime-mode .stats-grid .stat-val { color: var(--anime-primary); }

/* Legend markers — > chevrons */
.dot {
  display: inline-block;
  margin-right: 4px;
  vertical-align: middle;
  font-family: 'DOS JP', monospace;
  font-size: 10px;
  font-weight: normal;
  line-height: 1;
  width: auto;
  height: auto;
  background: none !important;
  transform: none;
}

.dot::before { content: ">"; }

.dot.watching  { color: #00cc55; }
.dot.completed { color: #e8e0dc; }
.dot.onhold    { color: #f3f34e; }
.dot.dropped   { color: #4edc4e; }
.dot.plan      { color: #515151; }

/* Extra stats row */
.extra-stats {
  display: flex;
  gap: 20px;
  margin-top: 10px;
  padding-top: 10px;
  position: relative;
  font-size: 12px;
  font-family: 'DOS JP', monospace;
  color: var(--text-muted);
  white-space: nowrap;
}

.extra-stats::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(to right, var(--manga-primary), transparent);
  opacity: 0.3;
  transition: background 0.5s ease;
}

.mal-widget.anime-mode .extra-stats::before {
  background: linear-gradient(to right, var(--anime-primary), transparent);
}

.extra-stats .stat-val {
  color: var(--manga-primary);
  font-weight: normal;
  font-family: 'DOS JP', monospace;
  font-size: 12px;
  image-rendering: pixelated;
}
.mal-widget.anime-mode .extra-stats .stat-val { color: var(--anime-primary); }

/* ===================== DIVIDER ===================== */
.divider {
  border: none;
  height: 1px;
  background: linear-gradient(to right, transparent, #2a2a2a, var(--manga-primary), #2a2a2a, transparent);
  margin: 16px 0;
  opacity: 0.5;
  transition: background 0.5s ease;
}

.mal-widget.anime-mode .divider {
  background: linear-gradient(to right, transparent, #0a4a1a, var(--anime-primary), #0a4a1a, transparent);
}

/* ===================== RECENT UPDATE ===================== */
.section-header {
  font-family: 'BestTen', monospace;
  font-size: 13px;
  font-weight: normal;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
  padding-left: 8px;
  border-left: 2px solid var(--manga-primary);
  transition: border-color 0.5s ease;
}

.mal-widget.anime-mode .section-header { border-left-color: var(--anime-primary); }

.update-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.update-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.update-item img {
  width: 36px;
  height: 51px;
  object-fit: cover;
  border-radius: 0;
  flex-shrink: 0;
  border: 1px solid #0a2a12;
  filter: grayscale(0.2) contrast(1.05);
  transition: filter 0.3s ease, border-color 0.3s ease;
}

.update-item:hover img {
  filter: grayscale(0) contrast(1.1);
  border-color: var(--manga-primary);
}

.mal-widget.anime-mode .update-item:hover img {
  border-color: var(--anime-primary);
}

.update-info {
  flex: 1;
  min-width: 0;
}

.update-title {
  font-size: 12px;
  font-family: 'DOS JP', monospace;
  font-weight: normal;
  color: var(--manga-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
  image-rendering: pixelated;
}

.update-title a {
  color: inherit;
  text-decoration: none;
  padding: 1px 3px;
  margin: -1px -3px;
  transition: color 0.2s ease, background 0.2s ease;
}

.update-title a:hover { color: #0e0e0e; background: var(--manga-primary); }
.mal-widget.anime-mode .update-title { color: var(--anime-primary); }
.mal-widget.anime-mode .update-title a:hover { color: #0e0e0e; background: var(--anime-primary); }

.update-meta {
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'DOS JP', monospace;
  margin-bottom: 6px;
}

@keyframes march-stripes {
  from { background-position: 0 0; }
  to   { background-position: 11.31px 0; }
}
/* Progress bar — diagonal stripe texture */
.progress-track {
  height: 5px;
  background: #101a10;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: repeating-linear-gradient(
    -45deg,
    var(--manga-primary) 0px,
    var(--manga-primary) 4px,
    transparent 4px,
    transparent 8px
  );
  width: 0%;
  transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
  animation: march-stripes 3s linear infinite;
  margin-left: -12px;
  padding-left: 12px;
  /* width is set as percentage of track, but we shifted 12px left via margin,
     so add 12px back via calc() in JS to compensate */
}

.mal-widget.anime-mode .progress-fill {
  background: repeating-linear-gradient(
    -45deg,
    var(--anime-primary) 0px,
    var(--anime-primary) 4px,
    transparent 4px,
    transparent 8px
  );
}

/* ===================== FAVORITES CAROUSEL ===================== */
.mal-carousel {
  margin-top: 25px;
  padding-top: 16px;
  position: relative;
  display: flex;
  flex-direction: column;
}

.mal-carousel::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--manga-primary), transparent);
  opacity: 0.5;
  transition: background 0.5s ease;
}

.mal-widget.anime-mode .mal-carousel::before {
  background: linear-gradient(to right, transparent, var(--anime-primary), transparent);
}

/* ===================== CCTV MONITOR SHELL ===================== */
@keyframes screen-flicker-ambient {
  0%, 100% { opacity: 1; }
  92%       { opacity: 1; }
  92.5%     { opacity: 0.92; }
  93%       { opacity: 1; }
}

.carousel-monitor {
  position: relative;
  background: #050505;
  border: 1px solid #081a0c;
  outline: 1px solid #0a2a12;
  outline-offset: 3px;
  box-shadow:
    inset 0 0 30px rgba(0,0,0,0.9),
    inset 0 0 8px rgba(0,180,70,0.06),
    0 0 0 4px #050a05,
    0 2px 12px rgba(0,0,0,0.7);
  padding: 6px;
  animation: screen-flicker-ambient 8s steps(1) infinite;
}

/* Corner bracket accents */
.carousel-monitor::before,
.carousel-monitor::after {
  content: "";
  position: absolute;
  width: 10px;
  height: 10px;
  pointer-events: none;
  z-index: 10;
}
.carousel-monitor::before {
  top: -1px; left: -1px;
  border-top: 2px solid var(--anime-primary);
  border-left: 2px solid var(--anime-primary);
  transition: border-color 0.5s ease;
}
.carousel-monitor::after {
  bottom: -1px; right: -1px;
  border-bottom: 2px solid var(--anime-primary);
  border-right: 2px solid var(--anime-primary);
  transition: border-color 0.5s ease;
}

.mal-widget.anime-mode .carousel-monitor::before { border-color: var(--anime-primary); }
.mal-widget.anime-mode .carousel-monitor::after  { border-color: var(--anime-primary); }

/* The actual screen area */
.carousel-window {
  width: 100%;
  height: 190px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  /* Slight phosphor-green tint is too much — keep it neutral dark */
  background: #060606;
}

/* Full-screen scanline overlay across the whole monitor */
.carousel-screen-overlay {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 3px
  );
  pointer-events: none;
  z-index: 20;
  animation: scanline-scroll 5s linear infinite;
}

/* Full-screen vignette — heavy corners like a real CRT */
.carousel-screen-vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(
    ellipse at center,
    transparent 40%,
    rgba(0,0,0,0.35) 75%,
    rgba(0,0,0,0.7) 100%
  );
  pointer-events: none;
  z-index: 21;
}

/* Timestamp / channel watermark — top-left corner of screen */
.carousel-screen-stamp {
  position: absolute;
  top: 1px;
  left: 2px;
  font-family: 'BestTen', monospace;
  font-size: 8px;
  font-weight: normal;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
  pointer-events: none;
  z-index: 22;
  line-height: 1.6;
  image-rendering: pixelated;
}

/* Channel ID — bottom-right */
.carousel-screen-ch {
  position: absolute;
  bottom: 2px;
  right: 3px;
  font-family: 'BestTen', monospace;
  font-size: 10px;
  font-weight: normal;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
  pointer-events: none;
  z-index: 22;
  image-rendering: pixelated;
}

/* Left/right fade for carousel edges — sits inside the window */
.carousel-window::before,
.carousel-window::after {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  width: 35px;
  z-index: 19;
  pointer-events: none;
}
.carousel-window::before {
  left: 0;
  background: linear-gradient(to right, #060606, transparent);
}
.carousel-window::after {
  right: 0;
  background: linear-gradient(to left, #060606, transparent);
}

.carousel-track {
  display: flex;
  align-items: center;
}

.carousel-item {
  margin: 0 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 70px;
  flex-shrink: 0;
}

.image-wrapper {
  height: 150px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
}

/* ---- CCTV scanline animation ---- */
@keyframes scanline-scroll {
  0%   { background-position: 0 0; }
  100% { background-position: 0 100px; }
}

@keyframes cctv-flicker {
  0%   { opacity: 1; }
  40%  { opacity: 1; }
  41%  { opacity: 0.7; }
  42%  { opacity: 1; }
  85%  { opacity: 1; }
  86%  { opacity: 0.5; }
  87%  { opacity: 0.85; }
  88%  { opacity: 1; }
  100% { opacity: 1; }
}

@keyframes cctv-glitch {
  0%   { transform: scale(1.35) translate(0,0) skewX(0deg);       filter: grayscale(0) sepia(0) contrast(1.05) brightness(1); }
  40%  { transform: scale(1.35) translate(0,0) skewX(0deg);       filter: grayscale(0) sepia(0) contrast(1.05) brightness(1); }
  41%  { transform: scale(1.35) translate(-1px,0) skewX(-0.8deg); filter: grayscale(0.1) sepia(0.2) contrast(1.2) brightness(1.1) hue-rotate(6deg); }
  42%  { transform: scale(1.35) translate(0,0) skewX(0deg);       filter: grayscale(0) sepia(0) contrast(1.05) brightness(1); }
  85%  { transform: scale(1.35) translate(0,0) skewX(0deg);       filter: grayscale(0) sepia(0) contrast(1.05) brightness(1); }
  86%  { transform: scale(1.35) translate(2px,-1px) skewX(1deg);  filter: grayscale(0.15) sepia(0.15) contrast(1.25) brightness(1.1); }
  87%  { transform: scale(1.35) translate(-1px,0) skewX(-0.5deg); filter: grayscale(0.05) sepia(0.05) contrast(1.1) brightness(0.95); }
  88%  { transform: scale(1.35) translate(0,0) skewX(0deg);       filter: grayscale(0) sepia(0) contrast(1.05) brightness(1); }
  100% { transform: scale(1.35) translate(0,0) skewX(0deg);       filter: grayscale(0) sepia(0) contrast(1.05) brightness(1); }
}

@keyframes cctv-hover-wave {
  0%   { transform: translateY(0); opacity: 0.18; }
  50%  { transform: translateY(-8px); opacity: 0.12; }
  100% { transform: translateY(0); opacity: 0.18; }
}

/* Side items: desaturated CCTV look */
.carousel-item img {
  width: 70px;
  transition: transform 0.6s ease, opacity 0.6s ease, filter 0.6s ease;
  opacity: 0.5;
  border: 1px solid #0a2a12;
  transform: scale(0.88);
  filter: grayscale(0.75) sepia(0.3) contrast(0.85) brightness(0.8);
  cursor: pointer;
}

/* Center item wrapper — holds scanline overlay */
.carousel-item.center .image-wrapper {
  position: relative;
}

/* Scanline overlay on center item */
.carousel-item.center .image-wrapper::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0, 0, 0, 0.22) 3px,
    rgba(0, 0, 0, 0.22) 4px
  );
  pointer-events: none;
  z-index: 3;
  animation: scanline-scroll 3s linear infinite;
  border-radius: 0;
}

/* Moving bright scan band that drifts down */
.carousel-item.center .image-wrapper::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 30%;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    rgba(255,255,255,0.04) 40%,
    rgba(255,255,255,0.07) 50%,
    rgba(255,255,255,0.04) 60%,
    transparent 100%
  );
  pointer-events: none;
  z-index: 4;
  animation: cctv-hover-wave 4s ease-in-out infinite;
}

/* Center item — full with CCTV flicker + glitch */
.carousel-item.center img {
  transform: scale(1.35);
  opacity: 1;
  filter: grayscale(0) sepia(0) contrast(1.05) brightness(1);
  border: 2px solid var(--anime-primary);
  box-shadow:
    0 0 0 1px rgba(0,180,70,0.3),
    0 0 18px var(--anime-glow),
    0 0 40px var(--anime-glow-sm),
    0 20px 45px rgba(0,0,0,0.8);
  animation:
    cctv-flicker 7s steps(1) infinite,
    cctv-glitch  7s steps(1) infinite;
}

/* Hover: intensify the scanlines + add chromatic aberration-like effect */
.carousel-window:hover .carousel-item.center img {
  animation:
    cctv-flicker 3s steps(1) infinite,
    cctv-glitch  3s steps(1) infinite;
}

.carousel-window:hover .carousel-item.center .image-wrapper::before {
  animation: scanline-scroll 1s linear infinite;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.3) 2px,
    rgba(0, 0, 0, 0.3) 3px
  );
}

.carousel-window:hover .carousel-item.center .image-wrapper::after {
  animation: cctv-hover-wave 1.2s ease-in-out infinite;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    rgba(200,255,200,0.05) 40%,
    rgba(200,255,200,0.10) 50%,
    rgba(200,255,200,0.05) 60%,
    transparent 100%
  );
}

.mal-widget.anime-mode .carousel-item.center img {
  border-color: var(--anime-primary);
  box-shadow:
    0 0 0 1px rgba(0,180,70,0.3),
    0 0 18px var(--anime-glow),
    0 0 40px var(--anime-glow-sm),
    0 20px 45px rgba(0,0,0,0.8);
}

.item-title {
  font-size: 11px;
  color: var(--text-dim);
  opacity: 0;
  margin-top: 6px;
  width: 90px;
  text-align: center;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.5;
  padding-bottom: 3px;
  position: relative;
  z-index: 3;
  font-family: 'BestTen', monospace;
  font-weight: normal;
}

.carousel-item.center .item-title {
  opacity: 1;
  color: var(--manga-primary);
  font-weight: normal;
  cursor: pointer;
  transition: color 0.2s ease, background 0.2s ease;
  text-shadow: 0 0 8px var(--manga-glow-sm);
  padding: 1px 3px;
}

.carousel-item.center .item-title:hover { color: #0e0e0e; background: var(--manga-primary); text-shadow: none; }

.mal-widget.anime-mode .carousel-item.center .item-title {
  color: var(--anime-primary);
  text-shadow: 0 0 8px var(--anime-glow-sm);
}
.mal-widget.anime-mode .carousel-item.center .item-title:hover { color: #0e0e0e; background: var(--anime-primary); text-shadow: none; }

/* ===================== FADE TRANSITION ===================== */
.content-fade {
  transition: opacity 0.2s ease;
}

.content-fade.fading { opacity: 0; }

/* ===================== IN-SCREEN REC INDICATOR ===================== */
.carousel-screen-rec {
  position: absolute;
  top: 1px;
  right: 2px;
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: 'BestTen', monospace;
  font-size: 8px;
  font-weight: normal;
  letter-spacing: 0.08em;
  color: rgba(0,180,70,0.5);
  pointer-events: none;
  z-index: 22;
  image-rendering: pixelated;
  transition: color 0.4s ease;
}

.carousel-screen-rec.live {
  color: rgba(0, 200, 80, 0.85);
}

.rec-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #083a18;
  flex-shrink: 0;
  animation: rec-pulse 2s ease-in-out infinite;
  transition: background 0.4s ease;
}

.carousel-screen-rec.live .rec-dot {
  background: #00cc55;
  animation: rec-live 1.4s ease-in-out infinite;
}
@keyframes rec-pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 4px #005522; }
  50%       { opacity: 0.25; box-shadow: 0 0 2px #002210; }
}

@keyframes rec-live {
  0%, 100% { opacity: 1; box-shadow: 0 0 6px #00aa44, 0 0 12px rgba(0,170,68,0.4); }
  50%       { opacity: 0.6; box-shadow: 0 0 3px #007733; }
}

.carousel-header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.carousel-header-row .section-header {

}

.carousel-flavor {

}

.rec-indicator {

  transition: color 0.4s ease;
}

.rec-indicator.live { color: #448866; }

  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #083a18;
  flex-shrink: 0;
  animation: rec-pulse 2s ease-in-out infinite;
  transition: background 0.4s ease;
}

.rec-indicator.live .rec-dot {
  background: #00cc55;

/* ===================== CCTV BOOT SCREEN ===================== */
@keyframes boot-static {
  0%   { opacity: 1; }
  8%   { opacity: 0.82; }
  10%  { opacity: 1; }
  15%  { opacity: 0.75; }
  18%  { opacity: 1; }
  22%  { opacity: 0.88; }
  25%  { opacity: 1; }
  30%  { opacity: 0.78; }
  35%  { opacity: 1; }
  40%  { opacity: 0.9; }
  50%  { opacity: 1; }
  60%  { opacity: 0.85; }
  70%  { opacity: 1; }
  80%  { opacity: 0.92; }
  100% { opacity: 1; }
}

@keyframes noise-shift {
  0%   { background-position: 0 0; }
  10%  { background-position: -5% -10%; }
  20%  { background-position: 10% 5%; }
  30%  { background-position: -8% 12%; }
  40%  { background-position: 5% -8%; }
  50%  { background-position: -12% 4%; }
  60%  { background-position: 8% -6%; }
  70%  { background-position: -4% 10%; }
  80%  { background-position: 6% -4%; }
  90%  { background-position: -10% 8%; }
  100% { background-position: 0 0; }
}

@keyframes boot-text-blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

@keyframes boot-fadeout {
  0%   { opacity: 1; }
  100% { opacity: 0; }
}

.carousel-boot-screen {
  position: absolute;
  inset: 0;
  background: #050a05;
  z-index: 30;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  animation: boot-static 0.4s steps(1) infinite;
  overflow: hidden;
}

/* Heavy animated noise — two layers stacked for density */
.carousel-boot-screen::before {
  content: "";
  position: absolute;
  inset: -20%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size: 120px 120px;
  opacity: 0.85;
  mix-blend-mode: screen;
  animation: noise-shift 0.08s steps(1) infinite;
  pointer-events: none;
}

/* Horizontal scan tear lines — much more visible */
.carousel-boot-screen::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.55) 3px,
      rgba(0,0,0,0.55) 4px
    ),
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 18px,
      rgba(255,255,255,0.04) 18px,
      rgba(255,255,255,0.04) 20px
    );
  pointer-events: none;
}

.boot-no-signal {
  font-family: 'DOS JP', monospace;
  font-size: 16px;
  font-weight: normal;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  position: relative;
  z-index: 2;
  image-rendering: pixelated;
}

.boot-connecting {
  font-family: 'DOS JP', monospace;
  font-size: 8px;
  font-weight: normal;
  letter-spacing: 0.04em;
  color: rgba(30,200,80,0.8);
  text-transform: uppercase;
  position: relative;
  z-index: 2;
  image-rendering: pixelated;
  animation: boot-text-blink 0.9s steps(1) infinite;
}

/* When signal acquired — fade the boot screen out */
.carousel-boot-screen.signal-acquired {
  animation: boot-fadeout 0.5s ease forwards;
  pointer-events: none;
}

/* ===================== CORNER ACCENTS ===================== */
.mal-widget::after {
  content: "";
  position: absolute;
  bottom: 0;
  right: 0;
  width: 16px;
  height: 16px;
  border-bottom: 2px solid var(--manga-primary);
  border-right: 2px solid var(--manga-primary);
  pointer-events: none;
  transition: border-color 0.5s ease;
}

.mal-widget.anime-mode::after {
  border-color: var(--anime-primary);
}

/* ===================== GLASS OVERLAY ===================== */
.glass-overlay {
  position: absolute;
  inset: 0;
  backdrop-filter: blur(0.5px) brightness(0.95);
  -webkit-backdrop-filter: blur(0.5px) brightness(0.95);
  background: 
    radial-gradient(
      ellipse at center,
      rgba(0,20,8,0.0) 40%,
      rgba(0, 10, 4, 0.24) 80%,
      rgba(0, 5, 2, 0.486) 100%
    ),
    rgba(0,20,8,0.08);
  pointer-events: none;
  z-index: 50;
}

</style>
</head>

<body>
<div class="mal-widget notranslate" id="widget" translate="no">

  <!-- HEADER: username LEFT, toggle RIGHT -->
  <div class="mal-header">
    <div class="mal-username-wrap">
      <span class="mal-username-label">User ID</span>
      <h2 class="mal-username" id="mal-username">—</h2>
    </div>
    <label class="mode-switch">
      <span class="label-manga">Manga</span>
      <input type="checkbox" id="modeToggle">
      <span class="slider"></span>
      <span class="label-anime">Anime</span>
    </label>
  </div>

  <!-- STATS SECTION -->
  <div class="content-fade" id="stats-section">

    <div class="stats-summary">
      <div class="readout-block">
        <span class="readout-key">Total Days</span>
        <span class="readout-val" id="days">—</span>
      </div>
      <div class="readout-block" style="text-align:right">
        <span class="readout-key">Mean Score</span>
        <span class="readout-val" id="mean">—</span>
      </div>
    </div>

    <div class="section-label" id="stats-label">Manga Stats</div>

    <svg class="stats-bar-svg" id="stats-bar-svg" width="100%" height="12" overflow="visible" xmlns="http://www.w3.org/2000/svg">
      <polygon id="bar-watching"  points="0,0 0,0 0,0 0,0"/>
      <polygon id="bar-completed" points="0,0 0,0 0,0 0,0"/>
      <polygon id="bar-onhold"    points="0,0 0,0 0,0 0,0"/>
      <polygon id="bar-dropped"   points="0,0 0,0 0,0 0,0"/>
      <polygon id="bar-plan"      points="0,0 0,0 0,0 0,0"/>
    </svg>

    <div class="stats-grid">
      <!-- Row 1 -->
      <div><span class="dot watching"></span><span id="label-watching">Reading</span> <span class="stat-val" id="stat-watching">—</span></div>
      <div>Total Entries <span class="stat-val" id="stat-total">—</span></div>
      <!-- Row 2 -->
      <div><span class="dot completed"></span>Completed <span class="stat-val" id="stat-completed">—</span></div>
      <div id="rewatch-row">Reread <span class="stat-val" id="stat-rewatch">—</span></div>
      <!-- Row 3 -->
      <div><span class="dot onhold"></span>On-Hold <span class="stat-val" id="stat-onhold">—</span></div>
      <div id="extra-episodes" style="display:none">Episodes <span class="stat-val" id="stat-episodes">—</span></div>
      <div id="extra-chapters" style="display:none">Chapters <span class="stat-val" id="stat-chapters">—</span></div>
      <!-- Row 4 -->
      <div><span class="dot dropped"></span>Dropped <span class="stat-val" id="stat-dropped">—</span></div>
      <div id="extra-volumes" style="display:none">Volumes <span class="stat-val" id="stat-volumes">—</span></div>
      <div id="extra-volumes-placeholder"></div>
      <!-- Row 5 -->
      <div><span class="dot plan"></span><span id="label-plan">Plan to Read</span> <span class="stat-val" id="stat-plan">—</span></div>
      <div></div>
    </div>

  </div>

  <hr class="divider">

  <!-- RECENT UPDATES -->
  <div class="content-fade" id="updates-section">
    <div class="section-header" id="updates-label">Recent Manga Updates</div>
    <div class="update-list" id="update-list"></div>
  </div>

  <!-- FAVORITES CAROUSEL -->
  <div class="mal-carousel content-fade" id="carousel-section">
    <div class="carousel-header-row">
      <div class="section-header" id="carousel-label">Manga Favorites</div>
    </div>
    <div class="carousel-flavor" id="carousel-flavor">接続中 myanimelist.net...</div>
    <div class="carousel-monitor">
      <div class="carousel-window" id="carousel-window">
        <div class="carousel-boot-screen" id="carousel-boot">
          <div class="boot-no-signal">サーバーを検索中。。。</div>
          <div class="boot-connecting" id="boot-connecting-text">応答待ち</div>
        </div>
        <div class="carousel-screen-overlay"></div>
        <div class="carousel-screen-vignette"></div>
        <div class="carousel-screen-stamp" id="screen-stamp">SRV-01 / MAL-NET<br>配信中</div>
        <div class="carousel-screen-rec" id="screen-rec">
          <div class="rec-dot"></div>
          <span id="rec-label">オンライン</span>
        </div>
        <div class="carousel-screen-ch" id="screen-ch">MAL</div>
        <div class="carousel-track" id="carousel-track"></div>
      </div>
    </div>
  </div>

  <div class="glass-overlay"></div>
</div>

<script>
(async () => {

  const API = "https://mal-widget-test.dreamstatemods.workers.dev/dream-state";

  const screenCh = document.getElementById("screen-ch");

  const res  = await fetch(API);
  const data = await res.json();

  const widget       = document.getElementById("widget");
  const toggle       = document.getElementById("modeToggle");
  const fadeSections = document.querySelectorAll(".content-fade");

  // USERNAME
  const usernameEl = document.getElementById("mal-username");
  usernameEl.textContent = data.username;
  usernameEl.onclick = () => window.open(data.profile.url, "_blank");

  // REC dot — go live now that data is loaded
  const recIndicator = document.getElementById("screen-rec");
  const recLabel     = document.getElementById("rec-label");
  const carouselFlavor = document.getElementById("carousel-flavor");
  recIndicator.classList.add("live");
  recLabel.textContent = "オンライン";

  // Screen clock
  function updateScreenCh(isAnime) {
    screenCh.textContent = isAnime ? "アニメ" : "漫画";
  }

  // ---- Stat bar SVG parallelograms ----
  let barAnimGen = 0;
  function animateBars(stats, isAnime) {
    const gen = ++barAnimGen;
    const total   = stats.total_entries || 1;
    const active  = isAnime ? stats.watching || 0 : stats.reading || 0;
    const planVal = isAnime ? stats.plan_to_watch || 0 : stats.plan_to_read || 0;

    const segments = [
      { id: "bar-watching",  value: active },
      { id: "bar-completed", value: stats.completed || 0 },
      { id: "bar-onhold",    value: stats.on_hold   || 0 },
      { id: "bar-dropped",   value: stats.dropped   || 0 },
      { id: "bar-plan",      value: planVal },
    ];

    const svg         = document.getElementById("stats-bar-svg");
    const svgW        = svg.getBoundingClientRect().width || 272;
    svg.setAttribute("viewBox", `0 0 ${svgW} 12`);
    svg.setAttribute("preserveAspectRatio", "none");
    const h           = 12;
    const skew        = 4;
    const gap         = 3;
    const activeCount = segments.filter(s => s.value > 0).length;
    const totalGap    = gap * Math.max(activeCount - 1, 0);

    // Pre-calculate final positions
    const targets = [];
    let cursor = 0;
    segments.forEach(seg => {
      const w = (seg.value / total) * (svgW - totalGap);
      targets.push({ id: seg.id, x0: cursor, targetW: Math.max(w, 0) });
      if (w > 0) cursor += w + gap;
    });

    // Zero out all segments first
    targets.forEach(seg => {
      const el = document.getElementById(seg.id);
      if (el) el.setAttribute("points", "0,0 0,0 0,0 0,0");
    });

    // Ease-out cubic
    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

    const duration  = 900;
    const startTime = performance.now();

    function frame(now) {
      if (gen !== barAnimGen) return; // stale animation — abort
      const t = easeOut(Math.min((now - startTime) / duration, 1));

      targets.forEach(seg => {
        const el = document.getElementById(seg.id);
        if (!el) return;
        const w = seg.targetW * t;
        if (w < 0.5) return;
        const x0 = seg.x0;
        const x1 = x0 + w;
        el.setAttribute("points", `${x0},${h} ${x1},${h} ${x1 + skew},0 ${x0 + skew},0`);
      });

      if ((now - startTime) < duration) requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  }

  // ---- Render updates ----
  function renderUpdates(entries, isAnime) {
    const list = document.getElementById("update-list");
    list.innerHTML = "";

    entries.slice(0, 5).forEach(update => {
      const image = update.image || "";
      const title = update.title || "";
      const url   = update.url   || "";

      let progress = update.progress || 0;
      let total    = isAnime ? (update.total_episodes || 0) : (update.total_chapters || 0);
      let label    = isAnime
        ? `Ep ${progress} / ${total || "?"}`
        : `Ch ${progress} / ${total || "?"}`;

      const pct = update.percentComplete ?? (total ? Math.round((progress / total) * 100) : 0);

      const el = document.createElement("div");
      el.className = "update-item";
      el.innerHTML = `
        <img src="${image}" alt="${title}" loading="lazy">
        <div class="update-info">
          <div class="update-title notranslate" translate="no">
            <a href="${url}" target="_blank">${title}</a>
          </div>
          <div class="update-meta">${label} · ${pct}%</div>
          <div class="progress-track">
            <div class="progress-fill" style="width:0%"></div>
          </div>
        </div>
      `;
      list.appendChild(el);
      const fill = el.querySelector(".progress-fill");
      requestAnimationFrame(() => requestAnimationFrame(() => {
        fill.style.width = "calc(" + pct + "% + 12px)";
      }));
    });
  }

  // ===================== CAROUSEL =====================
  let carouselFavs = [];
  let currentIndex = 0;
  let autoSlide    = null;

  function renderCarousel() {
    const track = document.getElementById("carousel-track");
    track.innerHTML = "";

    if (!carouselFavs.length) return;

    const n = carouselFavs.length;

    const visible = [
      carouselFavs[(currentIndex - 1 + n) % n],
      carouselFavs[currentIndex],
      carouselFavs[(currentIndex + 1) % n]
    ];

    visible.forEach((fav, i) => {
      const itemDiv = document.createElement("div");
      itemDiv.className = "carousel-item" + (i === 1 ? " center" : "");

      const img = document.createElement("img");
      img.src = fav.images?.jpg?.image_url || "";
      img.alt = fav.title;
      img.onclick = () => window.open(fav.url, "_blank");

      const title = document.createElement("div");
      title.className = "item-title notranslate";
      title.setAttribute("translate", "no");
      title.textContent = fav.title;
      title.onclick = () => window.open(fav.url, "_blank");

      const wrap = document.createElement("div");
      wrap.className = "image-wrapper";
      wrap.appendChild(img);

      itemDiv.appendChild(wrap);
      itemDiv.appendChild(title);
      track.appendChild(itemDiv);
    });
  }

  function nextSlide() {
    currentIndex = (currentIndex + 1) % carouselFavs.length;
    renderCarousel();
  }

  // Boot screen — fixed 4s overlay, dismisses on timer
  const bootScreen = document.getElementById("carousel-boot");
  setTimeout(() => {
    if (bootScreen) {
      bootScreen.classList.add("signal-acquired");
      bootScreen.addEventListener("animationend", () => bootScreen.remove(), { once: true });
    }
  }, 4000);

  let bootDismissed = false;

  function buildCarousel(favorites) {
    clearInterval(autoSlide);
    carouselFavs = favorites;
    currentIndex = 0;

    if (!favorites.length) {
      document.getElementById("carousel-track").innerHTML = "";
      return;
    }

    renderCarousel();
    autoSlide = setInterval(nextSlide, 4000);
  }

  document.getElementById("carousel-window")
    .addEventListener("mouseenter", () => clearInterval(autoSlide));

  document.getElementById("carousel-window")
    .addEventListener("mouseleave", () => {
      if (carouselFavs.length)
        autoSlide = setInterval(nextSlide, 4000);
    });

  // ===================== MAIN RENDER =====================
  function render(mode) {
    const isAnime = mode === "anime";
    const stats   = isAnime ? data.statistics.anime : data.statistics.manga;

    fadeSections.forEach(el => el.classList.add("fading"));

    setTimeout(() => {
      widget.classList.toggle("anime-mode", isAnime);

      document.getElementById("stats-label").textContent =
        isAnime ? "Anime Stats" : "Manga Stats";

      document.getElementById("mean").textContent =
        stats.mean_score ?? "—";

      document.getElementById("days").textContent =
        isAnime ? stats.days_watched ?? "—"
                : stats.days_read ?? "—";

      document.getElementById("label-watching").textContent = isAnime ? "Watching" : "Reading";
      document.getElementById("label-plan").textContent = isAnime ? "Plan to Watch" : "Plan to Read";

      document.getElementById("stat-watching").textContent =
        isAnime ? stats.watching ?? "—"
                : stats.reading ?? "—";

      document.getElementById("stat-completed").textContent = stats.completed ?? "—";
      document.getElementById("stat-onhold").textContent    = stats.on_hold ?? "—";
      document.getElementById("stat-dropped").textContent   = stats.dropped ?? "—";
      document.getElementById("stat-plan").textContent =
        isAnime ? stats.plan_to_watch ?? "—"
                : stats.plan_to_read ?? "—";

      document.getElementById("stat-total").textContent = stats.total_entries ?? "—";

      document.getElementById("stat-rewatch").textContent =
        isAnime ? stats.rewatched ?? "—"
                : stats.reread ?? "—";

      document.getElementById("rewatch-row").childNodes[0].textContent =
        isAnime ? "Rewatched " : "Reread ";

      document.getElementById("extra-episodes").style.display = isAnime ? "" : "none";
      document.getElementById("extra-chapters").style.display = isAnime ? "none" : "";
      document.getElementById("extra-volumes").style.display  = isAnime ? "none" : "";
      document.getElementById("extra-volumes-placeholder").style.display = isAnime ? "" : "none";

      document.getElementById("stat-episodes").textContent =
        stats.episodes_watched ?? "—";

      document.getElementById("stat-chapters").textContent =
        stats.chapters_read ?? "—";

      document.getElementById("stat-volumes").textContent =
        stats.volumes_read ?? "—";

      animateBars(stats, isAnime);

      const updates = isAnime
        ? data.recentUpdates.anime
        : data.recentUpdates.manga;

      document.getElementById("updates-label").textContent =
        isAnime ? "Recent Anime Updates" : "Recent Manga Updates";

      renderUpdates(updates || [], isAnime);

      const favorites = isAnime
        ? data.favorites.anime
        : data.favorites.manga;

      buildCarousel(favorites || []);

      document.getElementById("carousel-label").textContent =
        isAnime ? "Anime Favorites" : "Manga Favorites";

      screenCh.textContent = isAnime ? "アニメ" : "漫画";
      // Flavor text — live feed info in Japanese
      const favCount = (favorites || []).length;
      const feedSrc  = isAnime ? "アニメ" : "漫画";
      carouselFlavor.textContent =
        `ライブ配信 · myanimelist.net · ${feedSrc} ${favCount}件`;
      carouselFlavor.classList.add("live");

      fadeSections.forEach(el => el.classList.remove("fading"));

    }, 220);

    localStorage.setItem("malWidgetMode", mode);
  }

  // ---- Init ----
  const savedMode = localStorage.getItem("malWidgetMode") || "manga";
  toggle.checked  = savedMode === "anime";
  render(savedMode);

  toggle.addEventListener("change", () => {
    render(toggle.checked ? "anime" : "manga");
  });

})();
</script>

</body>
</html>
